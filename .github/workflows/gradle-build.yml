name: Gradle Build and Test

on:
  workflow_call:
    inputs:
      java-version:
        description: "JDK version"
        required: false
        type: string
        default: "21"
      spotless-check:
        description: "Run spotlessCheck before build"
        required: false
        type: boolean
        default: false
      coverage-overall-min:
        description: "JaCoCo minimum overall coverage %"
        required: false
        type: string
        default: "60"
      coverage-changed-min:
        description: "JaCoCo minimum changed files coverage %"
        required: false
        type: string
        default: "80"
      init-gradle-path:
        description: "Path to init.gradle for snapshot resolution (e.g. .github/assets/init.gradle)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      docker:
        image: docker:25-dind

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Configure init.gradle
        if: inputs.init-gradle-path != ''
        run: |
          mkdir -p /home/runner/.gradle/init.d
          cp "${{ inputs.init-gradle-path }}" /home/runner/.gradle/init.d/

      - name: Check formatting
        if: inputs.spotless-check
        run: ./gradlew spotlessCheck

      - name: Execute Gradle build
        id: build
        run: ./gradlew build

      - name: Upload build artifacts on failure
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: build-artifacts
          path: build/
          retention-days: 5

      - name: Add coverage to PR
        id: jacoco
        uses: madrapps/jacoco-report@db72e7e7c96f98d239967958b0a0a6ca7d3bb45f # v1.6.1
        with:
          paths: |
            ${{ github.workspace }}/**/build/reports/jacoco/**/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: ${{ inputs.coverage-overall-min }}
          min-coverage-changed-files: ${{ inputs.coverage-changed-min }}
        if: github.event_name == 'pull_request' && steps.build.outcome == 'success'
